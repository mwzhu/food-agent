version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: shopper-postgres
    environment:
      POSTGRES_DB: shopper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - shopper-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shopper"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: shopper-qdrant
    ports:
      - "6333:6333"
    volumes:
      - shopper-qdrant-data:/qdrant/storage

volumes:
  shopper-postgres-data:
  shopper-qdrant-data:
